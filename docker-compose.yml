services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - TRUST_ENABLE_PRESIDIO=true
      - TRUST_STRICT_MODE=true
      - TRUST_MAX_RETRIES=1
      - TRUST_LOGGING_ENABLED=true
      # Uncomment to use real OpenAI:
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./audit_log.json:/app/audit_log.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
